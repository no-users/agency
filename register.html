<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Apna agency </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            /* Mobile par scrolling enable karne ke liye hidden hata diya */
        }

        .elite-card { 
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 1);
        }

        /* Dashboard Mockup Perspective */
        .dashboard-mockup {
            width: 80%;
            border-radius: 1.2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.1);
            transform: perspective(1000px) rotateY(-10deg) rotateX(5deg);
        }

        /* Custom Scrollbar for Right Side */
        .form-container::-webkit-scrollbar { width: 5px; }
        .form-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .input-elite {
            border: 1.5px solid #f1f5f9;
            transition: all 0.3s ease;
        }
        .input-elite:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 bg-slate-900/30 backdrop-blur-md overflow-y-auto">

    <div class="bg-white w-full max-w-6xl rounded-[2.5rem] md:rounded-[3.5rem] elite-card overflow-hidden flex flex-col md:flex-row relative min-h-[600px]">
        
        <button onclick="window.location.href='index.html'" class="absolute top-6 right-8 z-[110] w-10 h-10 bg-white/90 shadow-xl rounded-full flex items-center justify-center text-slate-400 hover:text-red-500 transition-all border border-slate-100 group">
            <i class="fas fa-times text-lg group-hover:rotate-90 transition-transform"></i>
        </button>

        <div class="md:w-[35%] bg-[#1e1b4b] p-10 lg:p-14 text-white flex flex-col justify-between shrink-0 relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-indigo-500/20 rounded-full blur-3xl"></div>
            
            <div class="relative z-10 text-left">
                <div class="flex items-center space-x-3 mb-12">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-lg">
                        <i class="fas fa-shield-check text-indigo-600 text-xl"></i>
                    </div>
                    <span class="text-2xl font-black tracking-tighter uppercase italic">APNA <span class="text-indigo-400">AGENCY</span></span>
                </div>
                <h2 class="text-3xl font-extrabold leading-tight mb-4">India's Elite <br> <span class="text-indigo-300">B2B Network</span>.</h2>
                <p class="text-indigo-100/60 text-xs font-medium leading-relaxed mb-10">Start your agency today and earn the market's highest commissions.</p>
                
                <div class="hidden md:flex justify-center mt-6">
                    <img src="https://media.istockphoto.com/id/1419220283/id/foto/keamanan-cyber-ransomware-email-phishing-teknologi-terenkripsi-informasi-digital-dilindungi.jpg?s=1024x1024&w=is&k=20&c=iesXdRMvbBuzJp0FlvQzQXq25b7JFPOgueDMna0qO4I=" 
                         class="dashboard-mockup" alt="Dashboard">
                </div>
            </div>

            <div class="relative z-10 pt-8 border-t border-white/10 flex items-center space-x-2 text-[10px] font-bold uppercase tracking-widest opacity-60">
                <i class="fas fa-lock text-emerald-400"></i>
                <span>SSL Encrypted Registration</span>
            </div>
        </div>

        <div class="flex-1 p-8 lg:p-14 bg-white md:max-h-[720px] md:overflow-y-auto form-container">
            <div class="mb-10 text-left">
                <span class="inline-block px-3 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-widest rounded-md mb-3"> Enrollment Portal</span>
                <h3 class="text-3xl font-black text-slate-900">Create Account</h3>
                <p class="text-slate-400 text-xs mt-1 font-bold">Please fill in your valid documents details.</p>
            </div>

            <form id="eliteForm" class="space-y-6">
                <div class="space-y-1 text-left">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Account Role</label>
                    <select id="role" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold text-slate-700 cursor-pointer">
                        <option value="retailer">Retailer (Individual Shop)</option>
                        <option value="distributor">Distributor (Network Head)</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-left">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mobile No.</label>
                        <input type="tel" id="mobile" placeholder="98XXXXXXXX" maxlength="10" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-left">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email (Gmail)</label>
                        <input type="email" id="email" placeholder="rahul@gmail.com" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Date of Birth</label>
                        <input type="date" id="dob" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-left">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Shop Name</label>
                        <input type="text" id="shop" placeholder="Apna Store" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">State</label>
                        <select id="state" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold">
                            <option>Bihar</option><option>Delhi</option><option>UP</option><option>Maharashtra</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-left">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Aadhar Number</label>
                        <input type="number" id="aadhar" placeholder="12 Digits" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">PAN Card</label>
                        <input type="text" id="pan" placeholder="ABCDE1234F" class="input-elite w-full p-4 bg-slate-50 border-slate-100 rounded-2xl font-bold uppercase" required>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submitBtn" class="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition-all active:scale-95 flex items-center justify-center">
                        Launch Your Agency <i class="fas fa-arrow-right ml-3 text-sm"></i>
                    </button>
                    <p class="text-center mt-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest opacity-60">
                        © 2026 APNA AGENCY PRIVATE LIMITED
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
    // 1. Firebase Configuration (Aapki purani config)
    const firebaseConfig = {
        apiKey: "AIzaSyBWyMJvt0OpejwkFEstI_NQToHmMBGwkbE",
        authDomain: "agency-136b6.firebaseapp.com",
        projectId: "agency-136b6",
        storageBucket: "agency-136b6.firebasestorage.app",
        messagingSenderId: "503663950718",
        appId: "1:503663950718:web:8a30b18039c279ffac112f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 🛡️ FUNCTION: Unique 8-Digit ID banane ke liye
    async function generateUniqueId() {
        let isUnique = false;
        let newId = "";
        while (!isUnique) {
            newId = Math.floor(10000000 + Math.random() * 90000000).toString();
            const doc = await db.collection("partners").doc(newId).get();
            if (!doc.exists) isUnique = true;
        }
        return newId;
    }

    // 🔑 FUNCTION: Random Password banane ke liye
    function generateRandomPassword() { 
        return Math.random().toString(36).slice(-8).toUpperCase(); 
    }

    // 🚀 MAIN SUBMIT LOGIC
    document.getElementById('eliteForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        
        // Step 1: Loading State
        btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Securing Your ID...';
        btn.disabled = true;

        try {
            // Step 2: Generate Unique 8-Digit ID
            const finalUserId = await generateUniqueId();
            const finalPassword = generateRandomPassword();

            // Step 3: Collect All Form Values (Sahi tareeke se)
            const formData = {
                userId: finalUserId,
                password: finalPassword,
                role: document.getElementById('role').value,
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value.trim(),
                email: document.getElementById('email').value.trim().toLowerCase(),
                dob: document.getElementById('dob').value,
                shop: document.getElementById('shop').value,
                state: document.getElementById('state').value,
                aadhar: document.getElementById('aadhar').value.trim(),
                pan: document.getElementById('pan').value.trim().toUpperCase(),
                status: "Pending",
                wallet: 0,
                createdAt: new Date().toISOString()
            };

            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Checking Documents...';

            // Step 4: 🛡️ Duplicate Checks
            const mobileCheck = await db.collection("partners").where("mobile", "==", formData.mobile).get();
            if (!mobileCheck.empty) throw new Error("Mobile Number already registered!");

            const aadharCheck = await db.collection("partners").where("aadhar", "==", formData.aadhar).get();
            if (!aadharCheck.empty) throw new Error("Aadhar Number already in use!");

            const panCheck = await db.collection("partners").where("pan", "==", formData.pan).get();
            if (!panCheck.empty) throw new Error("PAN Card already in use!");

            const emailCheck = await db.collection("partners").where("email", "==", formData.email).get();
            if (!emailCheck.empty) throw new Error("Email Address already registered!");

            // Step 5: ✅ Final Save to Database
            await db.collection("partners").doc(finalUserId).set(formData);
            
            alert(`🎉 Success!\nUser ID: ${finalUserId}\nPassword: ${finalPassword}\n\nNote: Admin approval pending.`);
            window.location.href = 'login.html';

        } catch (error) {
            alert("⚠️ " + error.message);
            btn.innerHTML = 'Launch Your Agency <i class="fas fa-arrow-right ml-3 text-sm"></i>';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
