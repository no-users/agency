<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Apna agency</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; }
        .indigo-gradient { background: linear-gradient(135deg, #07035c 0%, #3730a3 100%); }
        .text-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .login-card {
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.12);
        }

        .input-group:focus-within label { color: #4f46e5; }
        .input-field {
            border: 2px solid #f1f5f9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus {
            border-color: #4f46e5;
            background: white;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.1);
            outline: none;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6 bg-slate-900/5 backdrop-blur-sm">

    <div class="bg-white w-full max-w-5xl h-[auto] md:h-[650px] rounded-[3rem] overflow-hidden flex flex-col md:flex-row relative login-card animate-in fade-in zoom-in duration-500">
        
        <button onclick="window.location.href='index.html'" class="absolute top-6 right-8 z-[100] w-10 h-10 bg-white/80 backdrop-blur shadow-lg rounded-full flex items-center justify-center text-slate-400 hover:text-red-500 transition-all border border-slate-100 group">
            <i class="fas fa-times text-lg group-hover:rotate-90 transition-transform"></i>
        </button>

        <div class="md:w-1/2 indigo-gradient p-12 text-white flex flex-col justify-between relative overflow-hidden">
            <div class="absolute -top-20 -left-20 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-indigo-400/20 rounded-full blur-3xl"></div>

            <div class="relative z-10">
                <div class="flex items-center space-x-3 mb-14">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-xl">
                        <i class="fas fa-rocket text-indigo-600"></i>
                    </div>
                    <span class="text-2xl font-black tracking-tighter uppercase italic">APNA <span class="text-indigo-300">AGENCY</span></span>
                </div>

                <h1 class="text-4xl lg:text-5xl font-extrabold leading-tight mb-6">
                    Welcome to the <br> <span class="text-indigo-200">Elite Circle.</span>
                </h1>
                <p class="text-indigo-100/70 text-sm font-medium leading-relaxed max-w-xs">
                    Access your personalized dashboard to manage recharges, bills, and high-margin payouts.
                </p>
            </div>

            <div class="relative z-10 flex justify-center mt-6">
                <img src="https://media.istockphoto.com/id/1310129244/id/foto/keamanan-teknologi-digital-keamanan-siber.jpg?s=1024x1024&w=is&k=20&c=6TB8DDlxMAAHoTx1qY-vT0pPfRmi3_hiW-tRptpcTlE=" 
                     class="w-64 rounded-2xl shadow-2xl border-4 border-white/20 animate-float" alt="Sleek Analytics">
            </div>

            <div class="relative z-10 pt-6 border-t border-white/10">
                <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-60">Verified B2B Partner Portal</p>
            </div>
        </div>

        <div class="flex-1 p-10 md:p-16 flex flex-col justify-center bg-white">
            <div class="mb-10 text-left">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Partner Login</h2>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Enter credentials to continue</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-1 input-group">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 transition-colors">User ID / Partner ID</label>
                    <div class="relative">
                        <i class="fas fa-user-circle absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="text" id="loginId" placeholder="AA763402" 
                               class="input-field w-full p-4.5 pl-12 bg-slate-50 rounded-2xl font-bold text-slate-700" required>
                    </div>
                </div>

                <div class="space-y-1 input-group">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest transition-colors">Password</label>
                        <button type="button" onclick="alert('Please contact Admin to reset password')" class="text-[10px] font-black text-indigo-600 uppercase hover:underline">Forgot Password?</button>
                    </div>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="password" id="loginPass" placeholder="••••••••" 
                               class="input-field w-full p-4.5 pl-12 bg-slate-50 rounded-2xl font-bold text-slate-700" required>
                    </div>
                </div>

                <button type="submit" id="loginBtn" 
                        class="w-full py-5 indigo-gradient text-white rounded-2xl font-black text-lg shadow-xl shadow-indigo-100 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center uppercase tracking-widest">
                    Access Dashboard <i class="fas fa-chevron-right ml-3 text-sm"></i>
                </button>
            </form>

            <div class="mt-12 text-center">
                <p class="text-sm font-bold text-slate-400">
                    New to Apna Agency? 
                    <a href="register.html" class="text-indigo-600 font-extrabold hover:underline ml-1">Apply for ID</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBWyMJvt0OpejwkFEstI_NQToHmMBGwkbE",
            authDomain: "agency-136b6.firebaseapp.com",
            projectId: "agency-136b6",
            storageBucket: "agency-136b6.firebasestorage.app",
            messagingSenderId: "503663950718",
            appId: "1:503663950718:web:8a30b18039c279ffac112f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. Login Logic ---
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const userId = document.getElementById('loginId').value.trim();
            const userPass = document.getElementById('loginPass').value;

            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> Authenticating...';
            btn.disabled = true;

            try {
                const doc = await db.collection("partners").doc(userId).get();

                if (doc.exists) {
                    const userData = doc.data();
                    if (userData.password === userPass) {
                        if (userData.status === "Approved") {
                            alert("Welcome back, " + userData.name);
                            window.location.href = "dashboard.html";
                        } else {
                            alert("Access Denied: Your account is still 'Pending' for Admin Approval.");
                        }
                    } else {
                        alert("Invalid Password! Please check and try again.");
                    }
                } else {
                    alert("User ID not found in our database!");
                }
            } catch (err) {
                alert("Database Error: " + err.message);
            } finally {
                btn.innerHTML = 'Access Dashboard <i class="fas fa-chevron-right ml-3 text-sm"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
